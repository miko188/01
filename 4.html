<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise CRM PRO v3.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* ============================================================
           ROOT VARIABLES - Толық теңшеу
        ============================================================ */
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #dbeafe;
            --primary-gradient: linear-gradient(135deg, #2563eb, #7c3aed);
            --success: #16a34a;
            --success-light: #dcfce7;
            --warning: #d97706;
            --warning-light: #fef3c7;
            --danger: #dc2626;
            --danger-light: #fee2e2;
            --info: #0891b2;
            --info-light: #cffafe;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --sidebar-width: 280px;
            --header-height: 64px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.15);
            --radius: 12px;
            --radius-lg: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-family);
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.6;
            overflow-x: hidden;
        }
        button, input, select, textarea { font-family: inherit; }

        /* ============================================================
           SCROLLBAR
        ============================================================ */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--gray-100); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

        /* ============================================================
           LOGIN SCREEN - Кәсіби дизайн
        ============================================================ */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            position: fixed;
            inset: 0;
            z-index: 9999;
            transition: var(--transition);
        }
        .login-screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }
        .login-box {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            max-height: 95vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .login-box .logo { text-align: center; margin-bottom: 32px; }
        .login-box .logo i {
            font-size: 52px;
            color: var(--primary);
            background: var(--primary-light);
            padding: 16px;
            border-radius: 50%;
        }
        .login-box .logo h1 {
            font-size: 28px;
            margin-top: 12px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .login-box .logo p { color: var(--gray-500); font-size: 14px; }
        .login-tabs {
            display: flex;
            gap: 4px;
            background: var(--gray-100);
            border-radius: var(--radius);
            padding: 4px;
            margin-bottom: 24px;
        }
        .login-tabs button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            background: transparent;
            transition: var(--transition);
            color: var(--gray-500);
        }
        .login-tabs button.active {
            background: #fff;
            color: var(--gray-900);
            box-shadow: var(--shadow);
        }
        .login-box .form-group { margin-bottom: 16px; }
        .login-box .form-group label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: var(--gray-700);
            margin-bottom: 4px;
        }
        .login-box .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            font-size: 14px;
            transition: var(--transition);
            background: var(--gray-50);
        }
        .login-box .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background: #fff;
        }
        .login-box .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .login-box .form-options a {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }
        .login-box .form-options a:hover { text-decoration: underline; }
        .login-box .btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            background: var(--primary-gradient);
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }
        .login-box .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
        }
        .login-box .error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; text-align: center; }
        .login-box .success-msg { color: var(--success); font-size: 13px; margin-top: 8px; text-align: center; }

        /* ============================================================
           MAIN APP
        ============================================================ */
        .app-container { display: none; min-height: 100vh; }
        .app-container.active { display: flex; }

        /* ============================================================
           SIDEBAR - Кәсіби мәзір
        ============================================================ */
        .sidebar {
            width: var(--sidebar-width);
            background: #fff;
            border-right: 1px solid var(--gray-200);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
            z-index: 100;
            transition: var(--transition);
            padding: 0 0 20px 0;
        }
        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 10;
        }
        .sidebar-header i { font-size: 28px; color: var(--primary); }
        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-menu { padding: 8px 0; }
        .sidebar-menu .menu-group { padding: 4px 0; }
        .sidebar-menu .menu-group-title {
            padding: 8px 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--gray-400);
            letter-spacing: 0.8px;
        }
        .sidebar-menu .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            cursor: pointer;
            transition: var(--transition);
            border-left: 3px solid transparent;
            color: var(--gray-600);
            font-size: 14px;
            font-weight: 500;
            border-radius: 0 8px 8px 0;
            margin: 2px 8px 2px 0;
        }
        .sidebar-menu .menu-item:hover {
            background: var(--gray-50);
            color: var(--gray-900);
        }
        .sidebar-menu .menu-item.active {
            background: var(--primary-light);
            color: var(--primary);
            border-left-color: var(--primary);
        }
        .sidebar-menu .menu-item i { width: 20px; text-align: center; font-size: 16px; }
        .sidebar-menu .menu-item .badge {
            margin-left: auto;
            background: var(--gray-200);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .sidebar-menu .menu-item.active .badge { background: var(--primary); color: #fff; }

        /* ============================================================
           MAIN CONTENT
        ============================================================ */
        .main-content { margin-left: var(--sidebar-width); flex: 1; min-height: 100vh; }
        .main-header {
            height: var(--header-height);
            padding: 0 28px;
            background: #fff;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .main-header .page-title { font-size: 20px; font-weight: 700; }
        .main-header .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .main-header .header-actions button {
            padding: 8px 16px;
            border-radius: 8px;
            background: var(--gray-100);
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }
        .main-header .header-actions button:hover { background: var(--gray-200); }
        .main-header .header-actions .btn-primary {
            background: var(--primary-gradient);
            color: #fff;
        }
        .main-header .header-actions .btn-primary:hover { box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
        .main-header .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .main-header .user-info .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--primary-gradient);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }
        .mobile-toggle {
            display: none;
            background: var(--gray-100);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 20px;
        }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; backdrop-filter: blur(4px); }

        /* ============================================================
           CONTENT AREA - Жақсартылған дизайн
        ============================================================ */
        .content-area { padding: 24px 28px; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #fff;
            padding: 20px 24px;
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
            transition: var(--transition);
            cursor: default;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary-gradient);
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .stat-card .stat-label { font-size: 13px; color: var(--gray-500); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .stat-value { font-size: 28px; font-weight: 800; margin-top: 4px; }
        .stat-card .stat-change { font-size: 13px; margin-top: 4px; }
        .stat-card .stat-change.positive { color: var(--success); }
        .stat-card .stat-change.negative { color: var(--danger); }

        /* Sub Tabs */
        .sub-tabs {
            display: flex;
            gap: 4px;
            background: #fff;
            padding: 6px;
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .sub-tabs button {
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            background: transparent;
            color: var(--gray-500);
            transition: var(--transition);
            white-space: nowrap;
        }
        .sub-tabs button:hover { background: var(--gray-100); }
        .sub-tabs button.active { background: var(--primary-gradient); color: #fff; }

        /* Table */
        .table-wrapper {
            background: #fff;
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
            overflow: hidden;
        }
        .table-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            background: var(--gray-50);
        }
        .table-header h3 { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .table-header .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .table-header .filters input,
        .table-header .filters select {
            padding: 8px 14px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 13px;
            min-width: 160px;
            background: #fff;
            transition: var(--transition);
        }
        .table-header .filters input:focus,
        .table-header .filters select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .table-container { overflow-x: auto; padding: 0 4px 4px 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            text-align: left;
            padding: 12px 16px;
            color: var(--gray-500);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--gray-200);
            background: var(--gray-50);
            position: sticky;
            top: 0;
            z-index: 5;
        }
        td { padding: 12px 16px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
        tr:hover td { background: var(--gray-50); }
        .status-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
            display: inline-block;
            text-transform: capitalize;
        }
        .status-badge.active { background: var(--success-light); color: var(--success); }
        .status-badge.pending { background: var(--warning-light); color: var(--warning); }
        .status-badge.inactive { background: var(--danger-light); color: var(--danger); }
        .status-badge.completed { background: var(--info-light); color: var(--info); }
        .status-badge.cancelled { background: var(--gray-200); color: var(--gray-500); }
        .status-badge.open { background: var(--info-light); color: var(--info); }
        .status-badge.closed { background: var(--success-light); color: var(--success); }
        .status-badge.high { background: var(--danger-light); color: var(--danger); }
        .status-badge.medium { background: var(--warning-light); color: var(--warning); }
        .status-badge.low { background: var(--success-light); color: var(--success); }

        .row-actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .row-actions button {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            background: transparent;
            transition: var(--transition);
        }
        .row-actions .btn-edit { color: var(--primary); }
        .row-actions .btn-edit:hover { background: var(--primary-light); }
        .row-actions .btn-delete { color: var(--danger); }
        .row-actions .btn-delete:hover { background: var(--danger-light); }
        .row-actions .btn-view { color: var(--gray-500); }
        .row-actions .btn-view:hover { background: var(--gray-100); }
        .row-actions .btn-archive { color: var(--warning); }
        .row-actions .btn-archive:hover { background: var(--warning-light); }
        .row-actions .btn-restore { color: var(--success); }
        .row-actions .btn-restore:hover { background: var(--success-light); }
        .row-actions .btn-copy { color: var(--info); }
        .row-actions .btn-copy:hover { background: var(--info-light); }
        .row-actions .btn-print { color: var(--gray-600); }
        .row-actions .btn-print:hover { background: var(--gray-100); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-400);
        }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state h3 { color: var(--gray-600); margin-bottom: 8px; }

        /* ============================================================
           MODAL - Кәсіби
        ============================================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal {
            background: #fff;
            border-radius: var(--radius-lg);
            max-width: 720px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px 36px;
            box-shadow: var(--shadow-xl);
            transform: scale(0.95) translateY(10px);
            transition: var(--transition);
        }
        .modal-overlay.open .modal { transform: scale(1) translateY(0); }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--gray-100);
        }
        .modal-header h3 { font-size: 20px; display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .modal-close {
            background: var(--gray-100);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: var(--transition);
        }
        .modal-close:hover { background: var(--gray-200); transform: rotate(90deg); }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-grid .full-width { grid-column: 1 / -1; }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-group label {
            font-weight: 600;
            font-size: 13px;
            color: var(--gray-700);
        }
        .form-group label .required { color: var(--danger); }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 14px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            font-size: 14px;
            transition: var(--transition);
            width: 100%;
            background: var(--gray-50);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
            background: #fff;
        }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--gray-200);
            flex-wrap: wrap;
        }
        .modal-footer button {
            padding: 10px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
        }
        .modal-footer .btn-cancel { background: var(--gray-100); color: var(--gray-700); }
        .modal-footer .btn-cancel:hover { background: var(--gray-200); }
        .modal-footer .btn-submit {
            background: var(--primary-gradient);
            color: #fff;
        }
        .modal-footer .btn-submit:hover { box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
        .modal-footer .btn-danger { background: var(--danger); color: #fff; }
        .modal-footer .btn-danger:hover { background: #b91c1c; }
        .modal-footer .btn-success { background: var(--success); color: #fff; }
        .modal-footer .btn-success:hover { background: #15803d; }

        /* ============================================================
           TOAST NOTIFICATIONS
        ============================================================ */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            padding: 14px 22px;
            border-radius: var(--radius);
            color: #fff;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.4s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 280px;
            max-width: 420px;
            font-weight: 500;
        }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.warning { background: var(--warning); }
        .toast.info { background: var(--primary); }
        .toast i { font-size: 18px; }
        @keyframes slideIn {
            from { transform: translateX(100%) scale(0.9); opacity: 0; }
            to { transform: translateX(0) scale(1); opacity: 1; }
        }

        /* ============================================================
           RESPONSIVE
        ============================================================ */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
            .main-content { margin-left: 0; }
            .mobile-toggle { display: flex; align-items: center; gap: 8px; }
            .stats-grid { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
        }
        @media (max-width: 768px) {
            .content-area { padding: 16px; }
            .main-header { padding: 0 16px; }
            .main-header .page-title { font-size: 16px; }
            .form-grid { grid-template-columns: 1fr; }
            .modal { padding: 24px 18px; }
            .table-header { flex-direction: column; align-items: stretch; }
            .table-header .filters { flex-direction: column; }
            .table-header .filters input,
            .table-header .filters select { min-width: 100%; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .login-box { padding: 32px 24px; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .modal-footer { flex-direction: column; }
            .modal-footer button { width: 100%; justify-content: center; }
            .main-header .header-actions .hide-mobile { display: none; }
        }
    </style>
</head>
<body>

<!-- ================================================================
   LOGIN SCREEN
=============================================================== -->
<div class="login-screen" id="loginScreen">

                'shipments', 'payments', 'invoices', 'suppliers', 'purchases', 'warehouse',
                'inventory', 'finance', 'employees', 'roles', 'tasks', 'chat', 'tickets',
                'reviews', 'coupons', 'banners', 'integrations', 'files', 'logs', 'settings',
                'calendar', 'notifications', 'marketing'
            ];
            this.load();
            if (this.data.users.length === 0) this.seedDemoData();
        }

        load() {
            const saved = localStorage.getItem('enterprise_crm_data_v3');
            if (saved) {
                try {
                    this.data = JSON.parse(saved);
                    for (const t of this.tables) {
                        if (!this.data[t]) this.data[t] = [];
                    }
                } catch { this.initEmpty(); }
            } else { this.initEmpty(); }
        }

        initEmpty() {
            this.data = {};
            for (const t of this.tables) this.data[t] = [];
        }

        save() {
            localStorage.setItem('enterprise_crm_data_v3', JSON.stringify(this.data));
        }

        get(table) { return this.data[table] || []; }

        insert(table, record) {
            const list = this.get(table);
            const maxId = list.reduce((max, r) => Math.max(max, r.id || 0), 0);
            const now = new Date().toISOString();
            const newRecord = { ...record, id: maxId + 1, created: now, updated: now };
            list.push(newRecord);
            this.save();
            return newRecord;
        }

        update(table, id, updates) {
            const list = this.get(table);
            const idx = list.findIndex(r => r.id === id);
            if (idx === -1) return null;
            list[idx] = { ...list[idx], ...updates, updated: new Date().toISOString() };
            this.save();
            return list[idx];
        }

        delete(table, id) {
            const list = this.get(table);
            const idx = list.findIndex(r => r.id === id);
            if (idx === -1) return false;
            list.splice(idx, 1);
            this.save();
            return true;
        }

        find(table, id) { return this.get(table).find(r => r.id === id) || null; }

        search(table, query) {
            const list = this.get(table);
            if (!query) return list;
            const q = query.toLowerCase();
            return list.filter(item =>
                Object.values(item).some(val => String(val).toLowerCase().includes(q))
            );
        }

        count(table) { return this.get(table).length; }

    // ================================================================

    // ================================================================
    function renderSidebar() {
        const container = document.getElementById('sidebarMenu');
        let html = '';
        for (const group of menuData) {
            html += `<div class="menu-group"><div class="menu-group-title">${group.group}</div>`;
            for (const item of group.items) {
                const isActive = currentModule === item.id ? 'active' : '';
                const count = getItemCount(item.id);
                html += `
                    <div class="menu-item ${isActive}" onclick="navigateTo('${item.id}')">
                        <i class="fas ${item.icon}"></i>
                        ${item.label}
                        ${count > 0 ? `<span class="badge">${count}</span>` : ''}
                    </div>
                `;
            }
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    function getItemCount(moduleId) {

            products: 'products', categories: 'categories', brands: 'brands',
            customers: 'customers', orders: 'orders', shipments: 'shipments',
            payments: 'payments', invoices: 'invoices', suppliers: 'suppliers',
            purchases: 'purchases', warehouse: 'warehouse', inventory: 'inventory',
            finance: 'finance', employees: 'employees', roles: 'roles',
            tasks: 'tasks', tickets: 'tickets', reviews: 'reviews',
            coupons: 'coupons', banners: 'banners', files: 'files',
            logs: 'logs', integrations: 'integrations'
        };
        const table = map[moduleId];
        return table ? db.count(table) : 0;
    }

    // ================================================================
    //  TOAST
    // ================================================================
    function showToast(type, message) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
        toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${message}`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100%) scale(0.9)';
            setTimeout(() => toast.remove(), 300);
        }, 3500);
    }

    // ================================================================
    //  AUTHENTICATION
    // ================================================================
    function switchLoginTab(tab) {
        document.querySelectorAll('.login-tabs button').forEach(b => b.classList.remove('active'));
        document.getElementById('loginError').textContent = '';
        document.getElementById('loginSuccess').textContent = '';
        if (tab === 'login') {
            document.querySelector('.login-tabs button:first-child').classList.add('active');
            document.getElementById('loginFields').style.display = 'block';
            document.getElementById('registerFields').style.display = 'none';
            document.getElementById('recoveryFields').style.display = 'none';
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('recoveryBtn').style.display = 'none';
            document.getElementById('loginBtn').innerHTML = '<i class="fas fa-sign-in-alt"></i> Кіру';
        } else if (tab === 'register') {
            document.querySelector('.login-tabs button:last-child').classList.add('active');
            document.getElementById('loginFields').style.display = 'none';
            document.getElementById('registerFields').style.display = 'block';
            document.getElementById('recoveryFields').style.display = 'none';
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('recoveryBtn').style.display = 'none';
            document.getElementById('loginBtn').innerHTML = '<i class="fas fa-user-plus"></i> Тіркелу';
        }
    }

    function showRecovery() {
        document.getElementById('loginFields').style.display = 'none';
        document.getElementById('registerFields').style.display = 'none';
        document.getElementById('recoveryFields').style.display = 'block';
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('recoveryBtn').style.display = 'block';
        document.getElementById('loginError').textContent = '';
        document.getElementById('loginSuccess').textContent = '';
    }

    function sendRecovery() {
        const email = document.getElementById('recoveryEmail').value;
        if (!email) { document.getElementById('loginError').textContent = 'Поштаны енгізіңіз'; return; }
        const user = db.get('users').find(u => u.email === email);
        if (!user) { document.getElementById('loginError').textContent = 'Пайдаланушы табылмады'; return; }
        document.getElementById('loginSuccess').textContent = 'Қалпына келтіру сілтемесі поштаға жіберілді';
        showToast('success', 'Сілтеме ' + email + ' поштасына жіберілді');
        setTimeout(() => switchLoginTab('login'), 2000);
    }

    function handleLogin(e) {
        e.preventDefault();
        document.getElementById('loginError').textContent = '';
        document.getElementById('loginSuccess').textContent = '';

        const isLogin = document.getElementById('loginFields').style.display !== 'none';
        const isRecovery = document.getElementById('recoveryFields').style.display === 'block';

        if (isRecovery) { sendRecovery(); return; }

        if (isLogin) {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const user = db.get('users').find(u => u.email === email && u.password === password);

            if (user) {
                if (user.status === 'inactive') {
                    document.getElementById('loginError').textContent = 'Аккаунт бұғатталған';
                    return;
                }
                currentUser = user;
                db.update('users', user.id, { lastLogin: new Date().toISOString() });
                db.insert('logs', { user: user.name, action: 'Жүйеге кіру', details: 'Сәтті кіру', ip: '127.0.0.1' });
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContainer').classList.add('active');
                document.getElementById('userNameDisplay').textContent = user.name;
                document.getElementById('userAvatar').textContent = user.name ? user.name[0] : 'A';
                showToast('success', `Қош келдіңіз, ${user.name}!`);
                renderSidebar();
                renderContent('dashboard');
            } else {
                document.getElementById('loginError').textContent = 'Қате электрондық пошта немесе құпия сөз';
            }
        } else {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            if (!name || !email || !password) {
                document.getElementById('loginError').textContent = 'Барлық міндетті өрістерді толтырыңыз';
                return;
            }
            if (password !== confirm) {
                document.getElementById('loginError').textContent = 'Құпия сөздер сәйкес келмейді';
                return;
            }
            if (db.get('users').find(u => u.email === email)) {
                document.getElementById('loginError').textContent = 'Бұл электрондық поштамен пайдаланушы бар';
                return;
            }

            const user = db.insert('users', {
                name, email, phone, password,
                role: 'manager', status: 'active', avatar: name[0],
                emailVerified: false, phoneVerified: false, twoFA: false
            });
            if (user) {
                db.insert('logs', { user: user.name, action: 'Тіркелу', details: 'Жаңа пайдаланушы', ip: '127.0.0.1' });
                document.getElementById('loginSuccess').textContent = 'Тіркелу сәтті! Жүйеге кіріңіз.';
                showToast('success', 'Тіркелу сәтті!');
                setTimeout(() => {
                    switchLoginTab('login');
                    document.getElementById('loginEmail').value = email;
                    document.getElementById('loginPassword').value = password;
                }, 1500);
            }
        }
    }

    function logout() {
        if (!confirm('Жүйеден шығу?')) return;
        if (currentUser) {
            db.insert('logs', { user: currentUser.name, action: 'Жүйеден шығу', details: 'Сеансты аяқтау', ip: '127.0.0.1' });
        }
        currentUser = null;
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('appContainer').classList.remove('active');
        showToast('info', 'Сіз жүйеден шықтыңыз');
    }

    function renderTable(area, table, title, columns) {
        currentTable = table;
        const data = db.get(table);
        area.innerHTML = `
            <div class="table-wrapper">
                <div class="table-header">
                    <h3><i class="fas ${getTableIcon(table)}"></i> ${title}</h3>
                    <div class="filters">
                        <input type="text" id="tableSearch" placeholder="🔍 Іздеу..." oninput="filterTable('${table}')" />
                        <select id="tableStatusFilter" onchange="filterTable('${table}')">
                            <option value="">Барлық күйлер</option>
                            <option value="active">Белсенді</option>
                            <option value="pending">Күтуде</option>
                            <option value="inactive">Белсенді емес</option>
                            <option value="completed">Аяқталған</option>
                            <option value="cancelled">Бас тартылған</option>
                            <option value="open">Ашық</option>
                            <option value="closed">Жабық</option>
                        </select>
                        <button onclick="openAddModal('${table}')" style="background:var(--primary-gradient);color:#fff;padding:8px 18px;border-radius:8px;font-weight:600;">
                            <i class="fas fa-plus"></i> Қосу
                        </button>
                        <button onclick="exportTable('${table}')" style="background:var(--gray-100);padding:8px 18px;border-radius:8px;font-weight:600;">
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                </div>
                <div class="table-container" id="tableContainer_${table}">
                    ${renderTableData(table, data, columns)}
                </div>
            </div>
        `;
        window[`_tableData_${table}`] = { data, columns };
    }

    function getTableIcon(table) {
        const icons = {
            products: 'fa-box', categories: 'fa-tags', brands: 'fa-trademark',
            customers: 'fa-users', orders: 'fa-shopping-cart', shipments: 'fa-truck',
            payments: 'fa-credit-card', invoices: 'fa-file-invoice',
            suppliers: 'fa-truck-loading', purchases: 'fa-shopping-bag',
            warehouse: 'fa-warehouse', employees: 'fa-user-tie',
            tickets: 'fa-headset', reviews: 'fa-star',
            coupons: 'fa-ticket-alt', banners: 'fa-images'
        };
        return icons[table] || 'fa-table';
    }

    function renderTableData(table, data, columns) {
        if (!data || data.length === 0) {
            return `<div class="empty-state"><i class="fas fa-inbox"></i><h3>Деректер жоқ</h3><p>Қосу үшін "Қосу" түймесін басыңыз</p></div>`;
        }
        let html = `<table><thead><tr>`;
        for (const col of columns) {
            if (col.key === 'actions') {
                html += `<th>Әрекеттер</th>`;
            } else {
                html += `<th>${col.label}</th>`;
            }
        }
        html += `</tr></thead><tbody>`;
        for (const item of data) {
            html += `<tr>`;
            for (const col of columns) {
                if (col.key === 'actions') {
                    html += `
                        <td>
                            <div class="row-actions">
                                <button class="btn-view" onclick="viewItem('${table}', ${item.id})" title="Қарау"><i class="fas fa-eye"></i></button>
                                <button class="btn-edit" onclick="openEditModal('${table}', ${item.id})" title="Өңдеу"><i class="fas fa-edit"></i></button>
                                <button class="btn-copy" onclick="copyItem('${table}', ${item.id})" title="Көшіру"><i class="fas fa-copy"></i></button>
                                <button class="btn-archive" onclick="archiveItem('${table}', ${item.id})" title="Мұрағаттау"><i class="fas fa-archive"></i></button>
                                <button class="btn-restore" onclick="restoreItem('${table}', ${item.id})" title="Қалпына келтіру"><i class="fas fa-undo"></i></button>
                                <button class="btn-print" onclick="printItem('${table}', ${item.id})" title="Басып шығару"><i class="fas fa-print"></i></button>
                                <button class="btn-delete" onclick="deleteItem('${table}', ${item.id})" title="Жою"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    `;
                } else {
                    html += `<td>${formatCell(item, col)}</td>`;
                }
            }
            html += `</tr>`;
        }
        html += `</tbody></table>`;
        return html;
    }

    function formatCell(item, col) {
        const val = item[col.key];
        if (col.key === 'status') {
            return `<span class="status-badge ${val}">${val || '—'}</span>`;
        }
        if (['price', 'total', 'amount', 'salary', 'totalSpent', 'discount'].includes(col.key)) {
            return val ? `${Number(val).toLocaleString()} ₸` : '—';
        }
        if (['created', 'updated', 'lastLogin', 'deadline', 'expires', 'delivered', 'paid', 'startDate', 'endDate'].includes(col.key)) {
            return val ? new Date(val).toLocaleDateString('kk-KZ') : '—';
        }
        if (col.key === 'items' && Array.isArray(val)) {
            return val.slice(0, 2).map(i => i.name || i).join(', ') + (val.length > 2 ? '...' : '');
        }
        if (col.key === 'rating') {
            return '⭐'.repeat(Math.round(val || 0));
        }
        if (val === undefined || val === null || val === '') return '—';
        if (typeof val === 'string' && val.length > 30) return val.slice(0, 27) + '...';
        if (typeof val === 'boolean') return val ? '✅' : '❌';
        return val;
    }

    function filterTable(table) {
        const search = document.getElementById('tableSearch').value.toLowerCase();
        const statusFilter = document.getElementById('tableStatusFilter').value;
        const allData = db.get(table);
        let filtered = allData;
        if (search) {
            filtered = filtered.filter(item =>
                Object.values(item).some(val => String(val).toLowerCase().includes(search))
            );
        }
        if (statusFilter) {
            filtered = filtered.filter(item => item.status === statusFilter);
        }
        const container = document.getElementById(`tableContainer_${table}`);
        if (container) {
            const columns = getColumnsForTable(table);
            container.innerHTML = renderTableData(table, filtered, columns);
        }
    }

    function getColumnsForTable(table) {
        const maps = {
            products: getProductColumns,
            categories: getCategoryColumns,
            brands: getBrandColumns,
            customers: getCustomerColumns,
            orders: getOrderColumns,
            shipments: getShipmentColumns,
            payments: getPaymentColumns,
            invoices: getInvoiceColumns,
            suppliers: getSupplierColumns,
            purchases: getPurchaseColumns,
            warehouse: getWarehouseColumns,
            employees: getEmployeeColumns,
            tickets: getTicketColumns,
            reviews: getReviewColumns,
            coupons: getCouponColumns,
            banners: getBannerColumns
        };
        const fn = maps[table];
        return fn ? fn() : [{ key: 'id', label: 'ID' }, { key: 'name', label: 'Атауы' }];
    }

    function openAddModal(table) {

        currentTable = table;
        const fields = getFormFields(table);
        document.getElementById('modalTitle').innerHTML = `<i class="fas fa-plus-circle"></i> ${getModuleLabel(table)} қосу`;
        document.getElementById('modalBody').innerHTML = fields;
        document.getElementById('modalSubmitBtn').innerHTML = '<i class="fas fa-save"></i> Сақтау';
        document.getElementById('modalOverlay').classList.add('open');
    }

    function openEditModal(table, id) {
        editId = id;
        currentTable = table;
        const item = db.find(table, id);
        if (!item) { showToast('error', 'Жазба табылмады'); return; }
        const fields = getFormFields(table, item);
        document.getElementById('modalTitle').innerHTML = `<i class="fas fa-edit"></i> ${getModuleLabel(table)} өңдеу`;
        document.getElementById('modalBody').innerHTML = fields;
        document.getElementById('modalSubmitBtn').innerHTML = '<i class="fas fa-save"></i> Жаңарту';
        document.getElementById('modalOverlay').classList.add('open');
    }

        document.getElementById('modalOverlay').classList.remove('open');

    function submitModalForm(e) {
        e.preventDefault();
        const table = currentTable;
        const data = collectFormData(table);

        if (editId) {
            const updated = db.update(table, editId, data);
            if (updated) {
                showToast('success', `#${editId} жазбасы жаңартылды`);
                db.insert('logs', { user: currentUser?.name || 'Жүйе', action: 'Жаңарту', details: `${table} #${editId}` });
            }
        } else {
            const created = db.insert(table, data);
            if (created) {
                showToast('success', `#${created.id} жазбасы қосылды`);
                db.insert('logs', { user: currentUser?.name || 'Жүйе', action: 'Қосу', details: `${table} #${created.id}` });
            }
        }
        closeModal();
        renderContent(currentModule);
    }

    function collectFormData(table) {
        const data = {};
        const fields = ['name', 'price', 'qty', 'barcode', 'status', 'category', 'brand', 'sku', 'desc',
            'email', 'phone', 'address', 'customer', 'items', 'total', 'payment', 'delivery',
            'company', 'position', 'department', 'salary', 'title', 'description', 'priority',
            'deadline', 'rating', 'comment', 'code', 'discount', 'type', 'expires', 'image',
            'link', 'position', 'carrier', 'tracking', 'method', 'amount', 'supplier',
            'orderId', 'parent', 'website', 'location', 'capacity', 'currentStock', 'manager'
        ];
        for (const f of fields) {
            const el = document.getElementById(`f_${f}`);
            if (el) {
                if (f === 'items') {
                    data[f] = el.value.split(',').map(s => s.trim()).filter(Boolean).map(n => ({ name: n, qty: 1, price: 0 }));
                } else if (['price', 'total', 'amount', 'salary', 'discount', 'capacity', 'currentStock'].includes(f)) {
                    data[f] = parseFloat(el.value) || 0;
                } else if (['qty', 'orderId'].includes(f)) {
                    data[f] = parseInt(el.value) || 0;
                } else if (['rating'].includes(f)) {
                    data[f] = parseInt(el.value) || 5;
                } else {
                    data[f] = el.value;
                }
            }
        }
        return data;
    }

    function deleteItem(table, id) {
        if (!confirm(`#${id} жазбасын жою?`)) return;
        const deleted = db.delete(table, id);
        if (deleted) {
            showToast('success', `#${id} жазбасы жойылды`);
            db.insert('logs', { user: currentUser?.name || 'Жүйе', action: 'Жою', details: `${table} #${id}` });
        }
        renderContent(currentModule);
    }

    function copyItem(table, id) {
        const item = db.find(table, id);
        if (!item) { showToast('error', 'Жазба табылмады'); return; }
        const { id: _, ...clone } = item;
        clone.name = clone.name + ' (көшірме)';
        const created = db.insert(table, clone);
        if (created) {
            showToast('success', `#${created.id} көшірмесі жасалды`);
            db.insert('logs', { user: currentUser?.name || 'Жүйе', action: 'Көшіру', details: `${table} #${id} → #${created.id}` });
        }
        renderContent(currentModule);
    }

    function archiveItem(table, id) {
        const item = db.find(table, id);
        if (!item) { showToast('error', 'Жазба табылмады'); return; }
        if (item.status === 'inactive') { showToast('warning', 'Қазірдің өзінде мұрағатталған'); return; }
        db.update(table, id, { status: 'inactive' });
        showToast('success', `#${id} жазбасы мұрағатталды`);
        db.insert('logs', { user: currentUser?.name || 'Жүйе', action: 'Мұрағаттау', details: `${table} #${id}` });
        renderContent(currentModule);
    }

    function restoreItem(table, id) {
        const item = db.find(table, id);
        if (!item) { showToast('error', 'Жазба табылмады'); return; }
        if (item.status !== 'inactive') { showToast('warning', 'Мұрағатта емес'); return; }
        db.update(table, id, { status: 'active' });
        showToast('success', `#${id} жазбасы қалпына келтірілді`);
        db.insert('logs', { user: currentUser?.name || 'Жүйе', action: 'Қалпына келтіру', details: `${table} #${id}` });
        renderContent(currentModule);
    }

    function viewItem(table, id) {
        const item = db.find(table, id);
        if (!item) { showToast('error', 'Жазба табылмады'); return; }
        const details = Object.entries(item)
            .map(([k, v]) => `${k}: ${typeof v === 'object' ? JSON.stringify(v) : v}`)
            .join('\n');
        alert(`📄 #${id} жазбасының мәліметтері\n\n${details}`);
    }

    function printItem(table, id) {
        const item = db.find(table, id);
        if (!item) { showToast('error', 'Жазба табылмады'); return; }
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html><head><title>Документ #${id}</title>
            <style>body{font-family:Arial;padding:40px;}h1{color:#2563eb;}table{width:100%;border-collapse:collapse;margin-top:20px;}td,th{padding:10px;border:1px solid #ddd;text-align:left;}</style>
            </head><body>
            <h1>Документ #${id}</h1>
            <table>${Object.entries(item).map(([k,v]) => `<tr><th>${k}</th><td>${typeof v === 'object' ? JSON.stringify(v) : v}</td></tr>`).join('')}</table>
            <p style="margin-top:30px;color:#666;">Жасалған: ${new Date().toLocaleString()}</p>
            </body></html>
        `);
        printWindow.document.close();
        printWindow.print();
    }

    function exportTable(table) {
        const data = db.get(table);
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${table}_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('success', `${table} экспортталды`);
    }

    function exportAllData() {
        const json = JSON.stringify(db.data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `crm_full_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('success', 'Толық сақтық көшірме экспортталды');
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    db.data = data;
                    db.save();
                    showToast('success', 'Деректер сәтті импортталды');
                    renderContent(currentModule);
                } catch (err) {
                    showToast('error', 'Импорт қатесі: жарамсыз пішім');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function saveInventory() {

    function addNewTask() {
        const title = prompt('Тапсырма атауын енгізіңіз:');
        if (title) {
            const task = db.insert('tasks', { 
                title, description: '', assigned: 'Тағайындалмаған', 
                status: 'pending', priority: 'medium', deadline: new Date(Date.now() + 7*24*60*60*1000).toISOString().slice(0,10)
            });
            if (task) {
                showToast('success', `#${task.id} тапсырмасы қосылды`);
                db.insert('logs', { user: currentUser?.name || 'Жүйе', action: 'Тапсырма қосу', details: task.title });
            }
            renderContent(currentModule);
        }
    }

    function completeTask(id) {
        db.update('tasks', id, { status: 'completed', completed: new Date().toISOString() });
        showToast('success', `#${id} тапсырмасы орындалды`);
        renderContent(currentModule);
    }

    function deleteTaskItem(id) {
        if (!confirm(`#${id} тапсырмасын жою?`)) return;
        db.delete('tasks', id);
        showToast('success', `#${id} тапсырмасы жойылды`);
        renderContent(currentModule);
    }

                name, size: (Math.random() * 5 + 1).toFixed(1) + ' MB', 
                type: ['pdf', 'xlsx', 'docx', 'png', 'jpg'][Math.floor(Math.random() * 5)]
            });
            if (file) {
                showToast('success', `"${name}" файлы жүктелді`);
                db.insert('logs', { user: currentUser?.name || 'Жүйе', action: 'Файл жүктеу', details: name });
            }
            renderContent(currentModule);
        }
    }

    function downloadFile(id) {
        const file = db.find('files', id);
        if (file) {
            showToast('info', `${file.name} жүктелуде`);
        }
    }

    function renameFile(id) {
        const file = db.find('files', id);
        if (!file) return;
        const newName = prompt('Файлдың жаңа атауы:', file.name);
        if (newName) {
            db.update('files', id, { name: newName });
            showToast('success', `Файл "${newName}" деп өзгертілді`);
            renderContent(currentModule);
        }
    }

    function deleteFileItem(id) {
        if (!confirm(`#${id} файлын жою?`)) return;
        db.delete('files', id);
        showToast('success', `#${id} файлы жойылды`);
        renderContent(currentModule);
    }

    // ================================================================
    //  LOGS
    // ================================================================
    function renderLogs(area) {
        const logs = db.get('logs').slice(0, 30);
        area.innerHTML = `
            <div class="table-wrapper">
                <div class="table-header">
                    <h3><i class="fas fa-history"></i> Әрекеттер журналы</h3>
                    <div class="filters">
                        <input type="text" id="logSearch" placeholder="🔍 Іздеу..." oninput="filterLogs()" style="min-width:200px;" />
                        <button onclick="exportTable('logs')" style="background:var(--gray-100);padding:8px 18px;border-radius:8px;font-weight:600;">
                            <i class="fas fa-download"></i>
                        </button>
                        ${currentUser?.role === 'admin' ? `
                            <button onclick="clearAllLogs()" style="background:var(--danger);color:#fff;padding:8px 18px;border-radius:8px;font-weight:600;">
                                <i class="fas fa-trash"></i> Тазалау
                            </button>
                        ` : ''}
                    </div>
                </div>
                <div class="table-container" id="logContainer">
                    <table><thead><tr><th>Пайдаланушы</th><th>Әрекет</th><th>Толықтыру</th><th>Уақыты</th></tr></thead>

                        <tr>
                            <td><i class="fas fa-user-circle"></i> ${l.user}</td>
                            <td><span class="status-badge ${l.action === 'Жүйеге кіру' ? 'active' : 'pending'}">${l.action}</span></td>
                            <td>${l.details || '—'}</td>
                            <td>${new Date(l.created).toLocaleString()}</td>
                        </tr>
                    `).join('')}</tbody></table>
                </div>
            </div>
        `;

    function filterLogs() {
        const search = document.getElementById('logSearch').value.toLowerCase();
        const logs = db.get('logs').filter(l =>
            l.user.toLowerCase().includes(search) ||
            l.action.toLowerCase().includes(search) ||
            (l.details || '').toLowerCase().includes(search)
        );
        const container = document.getElementById('logContainer');
        container.innerHTML = `
            <table><thead><tr><th>Пайдаланушы</th><th>Әрекет</th><th>Толықтыру</th><th>Уақыты</th></tr></thead>
            <tbody>${logs.slice(0, 30).map(l => `
                <tr><td><i class="fas fa-user-circle"></i> ${l.user}</td>
                <td><span class="status-badge ${l.action === 'Жүйеге кіру' ? 'active' : 'pending'}">${l.action}</span></td>
                <td>${l.details || '—'}</td>
                <td>${new Date(l.created).toLocaleString()}</td></tr>
            `).join('')}</tbody></table>
        `;
    }

    function clearAllLogs() {
        if (!confirm('Барлық әрекеттер журналын тазалау? Бұл әрекетті қайтару мүмкін емес!')) return;
        db.data.logs = [];
        db.save();
        showToast('success', 'Әрекеттер журналы тазаланды');
        renderContent(currentModule);
    }

    //  SETTINGS

                            <option value="$" ${getVal('currency') === '$' ? 'selected' : ''}>$ Доллар</option>

                    </div>

                        <button onclick="changeTheme('light')" style="flex:1;padding:12px;border:2px solid ${getVal('theme') === 'light' ? 'var(--primary)' : 'var(--gray-200)'};border-radius:8px;background:#fff;color:#000;font-weight:600;">

                            🌙 Қараңғы
                        </button>

                        </button>
                    </div>
                </div>
                <div class="table-wrapper" style="padding:24px;">
                    <h3 style="margin-bottom:16px;"><i class="fas fa-shield-alt"></i> Қауіпсіздік</h3>

                        <select id="set_2fa" style="padding:10px 14px;border:2px solid var(--gray-200);border-radius:8px;width:100%;">
                            <option value="0">Өшірулі</option>
                            <option value="1">Қосылған</option>
                        </select>
                    </div>
                    <div class="form-group"><label>API кілті</label>
                        <input type="text" value="sk_live_${Math.random().toString(36).substr(2, 16)}" style="padding:10px 14px;border:2px solid var(--gray-200);border-radius:8px;width:100%;" readonly />

                    <button onclick="saveSettings()" style="margin-top:12px;padding:10px 20px;background:var(--primary-gradient);color:#fff;border-radius:8px;font-weight:600;">
                        <i class="fas fa-save"></i> Сақтау
                    </button>
                    <button onclick="resetAllSettings()" style="margin-top:8px;padding:8px 16px;background:var(--danger);color:#fff;border-radius:8px;font-weight:600;margin-left:8px;">
                        <i class="fas fa-undo"></i> Қалпына келтіру
                    </button>
                </div>

    function saveSettings() {
        const settings = [
            { key: 'company_name', value: document.getElementById('set_company_name').value },
            { key: 'language', value: document.getElementById('set_language').value },
            { key: 'currency', value: document.getElementById('set_currency').value },
            { key: 'tax_rate', value: document.getElementById('set_tax').value }
        ];
        for (const s of settings) {
            const existing = db.get('settings').find(item => item.key === s.key);
            if (existing) {
                db.update('settings', existing.id, { value: s.value });
            } else {
                db.insert('settings', s);
            }
        }
        showToast('success', 'Баптаулар сақталды');
        db.insert('logs', { user: currentUser?.name || 'Жүйе', action: 'Баптаулар', details: 'Жаңартылды' });
    }

    function resetAllSettings() {
        if (!confirm('Барлық баптауларды бастапқы күйге қалпына келтіру?')) return;
        for (const s of db.get('settings')) {
            db.delete('settings', s.id);
        }
        db.insert('settings', { key: 'company_name', value: 'E-Commerce PRO' });
        db.insert('settings', { key: 'currency', value: '₸' });
        db.insert('settings', { key: 'language', value: 'kk' });
        db.insert('settings', { key: 'tax_rate', value: '12' });
        db.insert('settings', { key: 'theme', value: 'light' });
        showToast('success', 'Баптаулар бастапқы күйге қалпына келтірілді');
        renderContent(currentModule);
    }

    function changeTheme(theme) {
        showToast('info', `Тақырып "${theme}" деп өзгертілді`);
        const setting = db.get('settings').find(s => s.key === 'theme');
        if (setting) {
            db.update('settings', setting.id, { value: theme });
        } else {
            db.insert('settings', { key: 'theme', value: theme });
        }
        if (theme === 'dark') {
            document.body.style.background = '#0f172a';
            document.body.style.color = '#f1f5f9';
        } else {
            document.body.style.background = '';
            document.body.style.color = '';
        }
    }

    // ================================================================
    //  PROFILE
    // ================================================================
    function renderProfile(area) {
        const user = currentUser || db.get('users')[0] || { 
            name: 'Әкімші', email: 'admin@crm.kz', role: 'admin', 
            phone: '+7 777 777 77 77', emailVerified: true, phoneVerified: false,
            twoFA: false, lastLogin: new Date().toISOString()
        };
        
        area.innerHTML = `
            <div style="display:grid;grid-template-columns:280px 1fr;gap:20px;">
                <div class="table-wrapper" style="padding:24px;text-align:center;">
                    <div style="width:120px;height:120px;border-radius:50%;background:var(--primary-gradient);color:#fff;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:700;margin:0 auto 16px;position:relative;">
                        ${user.name ? user.name[0] : 'A'}
                        <button onclick="changeProfileAvatar()" style="position:absolute;bottom:0;right:0;background:var(--primary);color:#fff;border-radius:50%;width:36px;height:36px;font-size:14px;border:2px solid #fff;">
                            <i class="fas fa-camera"></i>
                        </button>

                    <h2>${user.name}</h2>

                    <p style="color:var(--gray-500);"><i class="fas fa-phone"></i> ${user.phone || '—'}</p>

                        <button onclick="changePassword()" style="padding:8px 20px;background:var(--gray-100);border-radius:8px;font-weight:600;">
                            <i class="fas fa-key"></i> Құпия сөзді өзгерту
                        </button>
                        <button onclick="enable2FA()" style="padding:8px 20px;background:${user.twoFA ? 'var(--success)' : 'var(--gray-100)'};border-radius:8px;font-weight:600;color:${user.twoFA ? '#fff' : 'inherit'};">
                            <i class="fas fa-shield-alt"></i> ${user.twoFA ? '2FA қосылған' : '2FA қосу'}

                        <button onclick="logout()" style="padding:8px 20px;background:var(--danger);color:#fff;border-radius:8px;font-weight:600;">

                        </button>

                </div>

                        <input type="text" id="profile_name" value="${user.name}" style="padding:10px 14px;border:2px solid var(--gray-200);border-radius:8px;width:100%;" /></div>
                    <div class="form-group"><label>Пошта</label>
                        <input type="email" id="profile_email" value="${user.email}" style="padding:10px 14px;border:2px solid var(--gray-200);border-radius:8px;width:100%;" />
                        ${user.emailVerified ? '<span style="color:var(--success);font-size:12px;">✅ Расталған</span>' : '<span style="color:var(--warning);font-size:12px;">⏳ Расталмаған <button onclick="verifyEmail()" style="color:var(--primary);background:transparent;">Растау</button></span>'}</div>
                    <div class="form-group"><label>Телефон</label>
                        <input type="text" id="profile_phone" value="${user.phone || ''}" style="padding:10px 14px;border:2px solid var(--gray-200);border-radius:8px;width:100%;" />
                        ${user.phoneVerified ? '<span style="color:var(--success);font-size:12px;">✅ Расталған</span>' : '<span style="color:var(--warning);font-size:12px;">⏳ Расталмаған <button onclick="verifyPhone()" style="color:var(--primary);background:transparent;">Растау</button></span>'}</div>
                    <div class="form-group"><label>Интерфейс тілі</label>
                        <select id="profile_language" style="padding:10px 14px;border:2px solid var(--gray-200);border-radius:8px;width:100%;">
                            <option value="kk">Қазақша</option>
                            <option value="ru">Русский</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Хабарландыру баптаулары</label>
                        <div style="display:flex;gap:16px;flex-wrap:wrap;padding:8px 0;">
                            <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" checked /> Пошта</label>

                            <i class="fas fa-save"></i> Сақтау
                        </button>

                            <i class="fas fa-history"></i> Кіру тарихы

    function changeProfileAvatar() {
        showToast('info', 'Жаңа профиль суретін таңдаңыз');
    }

    function verifyEmail() {
        showToast('success', 'Пошта расталды!');
        if (currentUser) {
            db.update('users', currentUser.id, { emailVerified: true });
        }
        renderContent(currentModule);
    }

    function verifyPhone() {
        showToast('success', 'Телефон расталды!');
        if (currentUser) {
            db.update('users', currentUser.id, { phoneVerified: true });
        }
        renderContent(currentModule);
    }

    function enable2FA() {
        if (currentUser) {
            const newState = !currentUser.twoFA;
            db.update('users', currentUser.id, { twoFA: newState });
            currentUser = db.find('users', currentUser.id);
            showToast('success', `2FA ${newState ? 'қосылды' : 'өшірілді'}`);
            renderContent(currentModule);
        }
    }

    function changePassword() {
        const old = prompt('Ағымдағы құпия сөзді енгізіңіз:');
        if (old && currentUser) {
            if (old === currentUser.password) {
                const newP = prompt('Жаңа құпия сөзді енгізіңіз:');
                if (newP) {
                    const confirmP = prompt('Жаңа құпия сөзді растаңыз:');
                    if (newP === confirmP) {
                        db.update('users', currentUser.id, { password: newP });
                        showToast('success', 'Құпия сөз өзгертілді');
                        db.insert('logs', { user: currentUser.name, action: 'Қауіпсіздік', details: 'Құпия сөзді өзгерту' });
                    } else {
                        showToast('error', 'Құпия сөздер сәйкес келмейді');
                    }
                }
            } else {
                showToast('error', 'Қате ағымдағы құпия сөз');
            }
        }
    }

    function saveProfile() {
        const name = document.getElementById('profile_name').value;
        const email = document.getElementById('profile_email').value;
        const phone = document.getElementById('profile_phone').value;
        if (currentUser) {
            db.update('users', currentUser.id, { name, email, phone });
            document.getElementById('userNameDisplay').textContent = name;
            document.getElementById('userAvatar').textContent = name ? name[0] : 'A';
            currentUser = db.find('users', currentUser.id);
            showToast('success', 'Профиль жаңартылды');
            db.insert('logs', { user: currentUser.name, action: 'Профиль', details: 'Деректерді жаңарту' });
        }
        renderContent(currentModule);
    }

    // ================================================================
    //  SIDEBAR TOGGLE
    // ================================================================
    function toggleSidebar(open) {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        if (open === undefined) {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        } else if (open) {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        } else {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
    }

    // ================================================================
    //  INIT - Жүйені іске қосу
    // ================================================================
    // Демо үшін автоматты кіру
    setTimeout(() => {
        const demoUser = db.get('users').find(u => u.email === 'admin@crm.kz');
        if (demoUser) {
            currentUser = demoUser;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appContainer').classList.add('active');
            document.getElementById('userNameDisplay').textContent = demoUser.name;
            document.getElementById('userAvatar').textContent = demoUser.name ? demoUser.name[0] : 'A';
            renderSidebar();
            renderContent('dashboard');
            console.log('✅ Пайдаланушы үшін автоматты кіру орындалды:', demoUser.name);
        }
    }, 300);

    // Модальды оверлей арқылы жабу
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // Консоль үшін жаһандық функциялар
    window.db = db;
    window.showToast = showToast;
    window.navigateTo = navigateTo;

    console.log('🚀 Enterprise CRM PRO v3.0 жүктелді!');
    console.log('📊 Модульдер саны: 31');
    console.log('📦 Кестелер саны: ' + db.tables.length);
    console.log('💾 Деректер localStorage: enterprise_crm_data_v3');
    console.log('👤 Пайдаланушылар: ' + db.count('users'));
    console.log('📦 Тауарлар: ' + db.count('products'));
    console.log('🛒 Тапсырыстар: ' + db.count('orders'));
    console.log('👥 Клиенттер: ' + db.count('customers'));
    console.log('📋 Барлығы: ' + db.tables.reduce((s, t) => s + db.count(t), 0));
</script>
